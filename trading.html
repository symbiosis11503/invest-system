<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>策略監控 — Symbiosis Invest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/invest-base.css">
<style>
:root{
  --bg:#09090b;--card:#121218;--border:#1e2d4a;
  --up:#ef4444;--down:#22c55e;--blue:#38bdf8;--purple:#a78bfa;
  --text:#e2e8f0;--dim:#64748b;--grid:#1a2240;
}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Symbol selector */
.symbol-bar{padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.symbol-select{background:#1a2240;color:var(--text);border:1px solid var(--border);border-radius:6px;
               padding:8px 12px;font-size:15px;font-weight:600;cursor:pointer;min-width:140px}
.symbol-select:focus{outline:none;border-color:var(--blue)}
.symbol-select option{background:#131a2e;color:var(--text)}

/* Price header */
.price-header{padding:12px 16px;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
.price-main{font-size:36px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.price-change{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums}
.price-up{color:var(--up)}.price-down{color:var(--down)}.price-flat{color:var(--dim)}

/* Mini stat cards */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px 12px;max-width:600px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;text-align:center}
.stat-label{font-size:11px;color:var(--dim);margin-bottom:2px}
.stat-value{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums}

/* Chart container */
.chart-wrap{position:relative;margin:0 8px;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.chart-wrap canvas{display:block;width:100%;cursor:crosshair}
.chart-legend{position:absolute;top:8px;right:12px;display:flex;gap:10px;font-size:11px;z-index:2;pointer-events:none}
.chart-legend span{display:flex;align-items:center;gap:4px}
.chart-legend i{display:inline-block;width:16px;height:2px;border-radius:1px}
.crosshair-info{position:absolute;top:8px;left:12px;font-size:12px;z-index:2;pointer-events:none;
                background:rgba(10,14,26,.85);padding:4px 8px;border-radius:4px;display:none;font-variant-numeric:tabular-nums}

/* Panels */
.panels{padding:12px 16px;display:grid;gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;overflow-x:auto}
.card h3{font-size:14px;color:var(--dim);margin-bottom:12px;font-weight:500}

/* Performance cards */
.perf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.perf-card{background:#0f1529;border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.perf-label{font-size:11px;color:var(--dim);margin-bottom:4px}
.perf-value{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
th{text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);color:var(--dim);font-weight:500;white-space:nowrap}
td{padding:6px 10px;border-bottom:1px solid #0f1529;white-space:nowrap}
.act-buy{color:var(--up);font-weight:600}.act-sell{color:var(--down);font-weight:600}
.pnl-pos{color:var(--up)}.pnl-neg{color:var(--down)}

/* Loading / error */
.loading{text-align:center;padding:40px;color:var(--dim)}
.error-msg{text-align:center;padding:20px;color:#f87171;background:#1a0f0f;border-radius:8px;margin:12px 16px}

/* Responsive */
@media(max-width:768px){
  .topbar{padding:8px 12px;gap:8px}
  .topbar .logo{font-size:14px}
  .topbar a.nav-link{font-size:12px;padding:6px 10px;min-height:44px;display:inline-flex;align-items:center}
  .symbol-bar{padding:10px 12px}
  .price-header{padding:10px 12px}
  .stats-row{padding:0 12px 10px}
  .chart-wrap{margin:0 4px}
  .panels{padding:10px 12px}
}
@media(max-width:640px){
  .price-main{font-size:28px}
  .price-change{font-size:15px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .perf-grid{grid-template-columns:repeat(2,1fr)}
  .perf-value{font-size:18px}
  table{font-size:12px}
  th,td{padding:4px 6px}
  .card{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .card table{min-width:400px}
}
@media(max-width:480px){
  .topbar{padding:6px 10px;gap:6px}
  .topbar .logo{font-size:13px}
  .topbar a.nav-link{font-size:11px;padding:6px 8px}
  .symbol-bar{padding:8px 10px;gap:8px}
  .symbol-select{font-size:14px;padding:8px 10px;min-height:44px}
  .price-header{padding:8px 10px;gap:10px}
  .price-main{font-size:24px}
  .price-change{font-size:13px}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:6px;padding:0 10px 8px}
  .stat-card{padding:6px 8px}
  .stat-label{font-size:10px}
  .stat-value{font-size:13px}
  .chart-wrap{margin:0 2px;border-radius:6px}
  .panels{padding:8px 10px;gap:10px}
  .card{padding:12px;border-radius:8px}
  .card h3{font-size:13px;margin-bottom:8px}
  .perf-card{padding:10px}
  .perf-label{font-size:10px}
  .perf-value{font-size:16px}
}
@media(max-width:380px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .stat-value{font-size:12px}
  .price-main{font-size:22px}
  .perf-grid{grid-template-columns:repeat(2,1fr)}
  .perf-value{font-size:14px}
}
</style>
</head>
<body>

<header class="main-header">
  <div class="logo">Symbiosis Invest</div>
  <nav class="main-nav">
    <a href="/" class="nav-link">儀表板</a>
    <a href="/trading" class="nav-link active">策略監控</a>
    <a href="/intelligence" class="nav-link">市場情報</a>
    <a href="/backtests" class="nav-link">回測結果</a>
    <a href="/messages" class="nav-link">群組監聽</a>
    <a href="/chipdata" class="nav-link">籌碼分析</a>
    <a href="/economic-calendar" class="nav-link">財經日曆</a>
  </nav>
</header>

<div class="symbol-bar">
  <select id="symbolSelect" class="symbol-select"><option>載入中...</option></select>
</div>

<div class="price-header">
  <span id="priceMain" class="price-main price-flat">--</span>
  <span id="priceChange" class="price-change price-flat">-- (--)</span>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-label">開盤</div><div class="stat-value" id="statOpen">--</div></div>
  <div class="stat-card"><div class="stat-label">最高</div><div class="stat-value" id="statHigh">--</div></div>
  <div class="stat-card"><div class="stat-label">最低</div><div class="stat-value" id="statLow">--</div></div>
  <div class="stat-card"><div class="stat-label">成交量</div><div class="stat-value" id="statVol">--</div></div>
</div>

<div class="chart-wrap" id="chartWrap">
  <div class="chart-legend">
    <span><i style="background:#eab308"></i>MA5</span>
    <span><i style="background:#38bdf8"></i>MA20</span>
    <span><i style="background:#a78bfa"></i>MA60</span>
  </div>
  <div class="crosshair-info" id="crossInfo"></div>
  <canvas id="kCanvas"></canvas>
</div>

<div class="panels">
  <div class="card">
    <h3>回測績效</h3>
    <div class="perf-grid" id="perfGrid">
      <div class="perf-card"><div class="perf-label">報酬率</div><div class="perf-value" id="perfReturn">--</div></div>
      <div class="perf-card"><div class="perf-label">最大回撤</div><div class="perf-value" id="perfDD">--</div></div>
      <div class="perf-card"><div class="perf-label">Sharpe</div><div class="perf-value" id="perfSharpe">--</div></div>
      <div class="perf-card"><div class="perf-label">勝率</div><div class="perf-value" id="perfWin">--</div></div>
    </div>
  </div>
  <div class="card">
    <h3>最近交易</h3>
    <div id="tradesTable"><div class="loading">載入中...</div></div>
  </div>
</div>

<script>
(function(){
"use strict";

// ── State ──
let rawData = [];       // [{date,open,high,low,close,volume}] chronological
let trades = [];        // all trades
let backtests = [];     // all backtests
let currentSymbol = '';

// Chart state
let viewStart = 0;
let viewEnd = 0;
let isDragging = false;
let dragStartX = 0;
let dragViewStart = 0;
const MIN_BARS = 15;
const MAX_BARS = 300;

// Touch state
let lastPinchDist = 0;
let lastTouchX = 0;

const cv = document.getElementById('kCanvas');
const ctx = cv.getContext('2d');
const wrap = document.getElementById('chartWrap');
const crossInfo = document.getElementById('crossInfo');

// ── Helpers ──
function fmt(v, d=2){ return v == null ? '--' : Number(v).toFixed(d); }
function fmtVol(v){ if(v==null) return '--'; if(v>=1e6) return (v/1e6).toFixed(1)+'M'; if(v>=1e3) return (v/1e3).toFixed(1)+'K'; return v.toString(); }
function fmtInt(v){ return v == null ? '--' : Number(v).toLocaleString(); }

// ── Fetch wrapper ──
async function apiFetch(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── Init ──
async function init(){
  try {
    const symbols = await apiFetch('/api/symbols');
    const sel = document.getElementById('symbolSelect');
    sel.innerHTML = '';
    if(!symbols.length){ sel.innerHTML='<option>無標的資料</option>'; return; }
    symbols.forEach(s=>{
      const o = document.createElement('option');
      o.value = s.symbol;
      o.textContent = `${s.symbol} (${s.count}筆)`;
      sel.appendChild(o);
    });
    sel.addEventListener('change', ()=> loadSymbol(sel.value));

    // Load backtests & trades in parallel
    const [bt, tr] = await Promise.all([
      apiFetch('/api/backtests').catch(()=>[]),
      apiFetch('/api/trades').catch(()=>[])
    ]);
    backtests = bt;
    trades = tr;

    loadSymbol(symbols[0].symbol);
  } catch(e){
    showError('無法載入標的清單: ' + e.message);
  }
}

function showError(msg){
  const el = document.createElement('div');
  el.className = 'error-msg';
  el.textContent = msg;
  document.querySelector('.panels').prepend(el);
  setTimeout(()=>el.remove(), 8000);
}

// ── Load symbol ──
async function loadSymbol(symbol){
  currentSymbol = symbol;
  try {
    const data = await apiFetch(`/api/market/${encodeURIComponent(symbol)}`);
    if(!data.length){ showError(`${symbol} 無行情資料`); return; }
    // API returns DESC, reverse to chronological
    rawData = data.reverse();
    viewStart = Math.max(0, rawData.length - 80);
    viewEnd = rawData.length;
    updatePriceHeader();
    updatePerf();
    updateTrades();
    resizeCanvas();
    drawChart();
  } catch(e){
    showError(`載入 ${symbol} 失敗: ${e.message}`);
  }
}

// ── Price header ──
function updatePriceHeader(){
  if(!rawData.length) return;
  const last = rawData[rawData.length-1];
  const prev = rawData.length>1 ? rawData[rawData.length-2] : last;
  const close = last.close;
  const prevClose = prev.close;
  const chg = close - prevClose;
  const chgPct = prevClose ? (chg/prevClose*100) : 0;
  const cls = chg>0?'price-up':chg<0?'price-down':'price-flat';

  document.getElementById('priceMain').textContent = fmt(close);
  document.getElementById('priceMain').className = 'price-main '+cls;
  const sign = chg>0?'+':'';
  document.getElementById('priceChange').textContent = `${sign}${fmt(chg)} (${sign}${fmt(chgPct)}%)`;
  document.getElementById('priceChange').className = 'price-change '+cls;

  document.getElementById('statOpen').textContent = fmt(last.open);
  document.getElementById('statHigh').textContent = fmt(last.high);
  document.getElementById('statLow').textContent = fmt(last.low);
  document.getElementById('statVol').textContent = fmtInt(last.volume);
}

// ── Perf panel ──
function updatePerf(){
  const bt = backtests.find(b=> b.symbol === currentSymbol);
  if(bt){
    const ret = bt.total_return||0;
    const retEl = document.getElementById('perfReturn');
    retEl.textContent = fmt(ret)+'%';
    retEl.style.color = ret>=0?'var(--up)':'var(--down)';

    const dd = bt.max_drawdown||0;
    const ddEl = document.getElementById('perfDD');
    ddEl.textContent = fmt(dd)+'%';
    ddEl.style.color = 'var(--down)';

    document.getElementById('perfSharpe').textContent = fmt(bt.sharpe_ratio);
    document.getElementById('perfSharpe').style.color = (bt.sharpe_ratio||0)>=1?'var(--up)':'var(--text)';

    const wr = bt.win_rate||0;
    const wrEl = document.getElementById('perfWin');
    wrEl.textContent = fmt(wr,1)+'%';
    wrEl.style.color = wr>=50?'var(--up)':'var(--down)';
  } else {
    ['perfReturn','perfDD','perfSharpe','perfWin'].forEach(id=>{
      const el = document.getElementById(id);
      el.textContent = '--';
      el.style.color = 'var(--dim)';
    });
  }
}

// ── Trades table ──
function updateTrades(){
  const symTrades = trades.filter(t=> t.symbol === currentSymbol);
  const box = document.getElementById('tradesTable');
  if(!symTrades.length){
    box.innerHTML = '<div style="color:var(--dim);text-align:center;padding:16px">尚無交易紀錄</div>';
    return;
  }
  let html = '<table><tr><th>日期</th><th>動作</th><th>價格</th><th>數量</th><th>損益</th></tr>';
  symTrades.slice(0,20).forEach(t=>{
    const pnl = t.pnl||0;
    const actCls = t.action==='buy'?'act-buy':'act-sell';
    const pnlCls = pnl>=0?'pnl-pos':'pnl-neg';
    const actText = t.action==='buy'?'買入':'賣出';
    const ts = (t.ts||'').slice(0,10);
    html += `<tr><td>${ts}</td><td class="${actCls}">${actText}</td><td>${fmt(t.price)}</td><td>${t.size||0}</td><td class="${pnlCls}">${fmt(pnl)}</td></tr>`;
  });
  html += '</table>';
  box.innerHTML = html;
}

// ── Canvas ──
function resizeCanvas(){
  const dpr = window.devicePixelRatio||1;
  const rect = wrap.getBoundingClientRect();
  const w = rect.width;
  const h = Math.min(480, Math.max(320, window.innerHeight*0.45));
  cv.style.width = w+'px';
  cv.style.height = h+'px';
  cv.width = w*dpr;
  cv.height = h*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

// ── Moving averages ──
function calcMA(data, period){
  const ma = [];
  for(let i=0;i<data.length;i++){
    if(i<period-1){ ma.push(null); continue; }
    let sum=0;
    for(let j=i-period+1;j<=i;j++) sum+=data[j].close;
    ma.push(sum/period);
  }
  return ma;
}

// ── Draw ──
function drawChart(){
  if(!rawData.length) return;
  const W = cv.width/(window.devicePixelRatio||1);
  const H = cv.height/(window.devicePixelRatio||1);
  ctx.clearRect(0,0,W,H);

  const pad = {t:16, b:24, l:56, r:8};
  const volH = H*0.18;
  const priceH = H - pad.t - pad.b - volH - 8;
  const chartW = W - pad.l - pad.r;

  const slice = rawData.slice(viewStart, viewEnd);
  const n = slice.length;
  if(!n) return;

  const barW = chartW / n;
  const candleW = Math.max(1, barW * 0.65);
  const gap = (barW - candleW)/2;

  // Price range
  let pMin=Infinity, pMax=-Infinity;
  slice.forEach(d=>{ if(d.low<pMin) pMin=d.low; if(d.high>pMax) pMax=d.high; });
  const pRange = pMax-pMin||1;
  pMin -= pRange*0.04; pMax += pRange*0.04;
  const py = v => pad.t + priceH - (v-pMin)/(pMax-pMin)*priceH;

  // Volume range
  let vMax = 0;
  slice.forEach(d=>{ if((d.volume||0)>vMax) vMax=d.volume||0; });
  if(!vMax) vMax=1;
  const volTop = H - pad.b - volH;
  const vy = v => H - pad.b - (v/vMax)*volH;

  // ── Grid lines ──
  ctx.strokeStyle = 'var(--grid)';
  ctx.strokeStyle = '#1a2240';
  ctx.lineWidth = 0.5;
  ctx.fillStyle = '#4a5568';
  ctx.font = '10px -apple-system,sans-serif';
  ctx.textAlign = 'right';
  for(let i=0;i<=5;i++){
    const v = pMin + (pMax-pMin)*i/5;
    const yy = py(v);
    ctx.beginPath(); ctx.moveTo(pad.l,yy); ctx.lineTo(W-pad.r,yy); ctx.stroke();
    ctx.fillText(v.toFixed(v>=1000?0:2), pad.l-4, yy+3);
  }

  // Separator line between price and volume
  ctx.beginPath(); ctx.moveTo(pad.l, volTop-4); ctx.lineTo(W-pad.r, volTop-4); ctx.stroke();

  // ── Volume bars ──
  slice.forEach((d,i)=>{
    const x = pad.l + i*barW + gap;
    const up = d.close >= d.open;
    ctx.fillStyle = up ? 'rgba(239,68,68,0.35)' : 'rgba(34,197,94,0.35)';
    const vt = vy(d.volume||0);
    ctx.fillRect(x, vt, candleW, H-pad.b-vt);
  });

  // ── Candles ──
  slice.forEach((d,i)=>{
    const x = pad.l + i*barW + gap;
    const cx = x + candleW/2;
    const up = d.close >= d.open;
    const color = up ? '#ef4444' : '#22c55e';

    // Wick
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, py(d.high));
    ctx.lineTo(cx, py(d.low));
    ctx.stroke();

    // Body
    const bodyTop = py(Math.max(d.open, d.close));
    const bodyBot = py(Math.min(d.open, d.close));
    const bodyH = Math.max(1, bodyBot - bodyTop);
    ctx.fillStyle = color;
    ctx.fillRect(x, bodyTop, candleW, bodyH);
  });

  // ── MA lines ──
  const maFull5 = calcMA(rawData, 5);
  const maFull20 = calcMA(rawData, 20);
  const maFull60 = calcMA(rawData, 60);
  const maSlice5 = maFull5.slice(viewStart, viewEnd);
  const maSlice20 = maFull20.slice(viewStart, viewEnd);
  const maSlice60 = maFull60.slice(viewStart, viewEnd);

  function drawMA(maArr, color){
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    let started = false;
    maArr.forEach((v,i)=>{
      if(v===null) return;
      const x = pad.l + i*barW + barW/2;
      const y = py(v);
      if(!started){ctx.moveTo(x,y);started=true;}
      else ctx.lineTo(x,y);
    });
    ctx.stroke();
  }
  drawMA(maSlice5, '#eab308');
  drawMA(maSlice20, '#38bdf8');
  drawMA(maSlice60, '#a78bfa');

  // ── Trade signals ──
  const symTrades = trades.filter(t=> t.symbol === currentSymbol);
  if(symTrades.length){
    const tradeDateMap = {};
    symTrades.forEach(t=>{
      const d = (t.ts||'').slice(0,10);
      if(!tradeDateMap[d]) tradeDateMap[d]=[];
      tradeDateMap[d].push(t);
    });
    slice.forEach((d,i)=>{
      const dt = d.date;
      if(!tradeDateMap[dt]) return;
      tradeDateMap[dt].forEach(t=>{
        const x = pad.l + i*barW + barW/2;
        const isBuy = t.action==='buy';
        const y = isBuy ? py(d.low)+14 : py(d.high)-14;
        ctx.fillStyle = isBuy ? '#ef4444' : '#22c55e';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(isBuy?'\u25B2':'\u25BC', x, y);
      });
    });
  }

  // ── X-axis date labels ──
  ctx.fillStyle = '#4a5568';
  ctx.font = '10px -apple-system,sans-serif';
  ctx.textAlign = 'center';
  const labelStep = Math.max(1, Math.floor(n/7));
  for(let i=0;i<n;i+=labelStep){
    const x = pad.l + i*barW + barW/2;
    ctx.fillText(slice[i].date.slice(5), x, H-6);
  }

  // Store layout for crosshair
  cv._layout = {pad, priceH, volH, chartW, pMin, pMax, volTop, vMax, barW, slice, n, W, H, py};
}

// ── Crosshair ──
function showCrosshair(clientX, clientY){
  const L = cv._layout;
  if(!L) return;
  const rect = cv.getBoundingClientRect();
  const mx = clientX - rect.left;
  const my = clientY - rect.top;

  if(mx<L.pad.l||mx>L.W-L.pad.r||my<L.pad.t||my>L.H-L.pad.b){
    crossInfo.style.display='none'; drawChart(); return;
  }

  const idx = Math.floor((mx-L.pad.l)/L.barW);
  if(idx<0||idx>=L.n){ crossInfo.style.display='none'; drawChart(); return; }

  drawChart();
  const d = L.slice[idx];
  const cx = L.pad.l + idx*L.barW + L.barW/2;
  const price = L.pMin + (1-(my-L.pad.t)/L.priceH)*(L.pMax-L.pMin);

  // Draw crosshair lines
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(cx,L.pad.t); ctx.lineTo(cx,L.H-L.pad.b); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(L.pad.l,my); ctx.lineTo(L.W-L.pad.r,my); ctx.stroke();
  ctx.setLineDash([]);

  // Price label on Y axis
  ctx.fillStyle='rgba(56,189,248,0.9)';
  ctx.fillRect(0, my-10, L.pad.l-2, 20);
  ctx.fillStyle='#0a0e1a';
  ctx.font='bold 10px -apple-system,sans-serif';
  ctx.textAlign='right';
  ctx.fillText(price.toFixed(2), L.pad.l-6, my+4);

  // Info box
  const chg = d.close - d.open;
  const color = chg>=0?'#ef4444':'#22c55e';
  crossInfo.style.display = 'block';
  crossInfo.innerHTML = `<span style="color:${color}">${d.date}</span>&nbsp; O:${fmt(d.open)} H:${fmt(d.high)} L:${fmt(d.low)} C:${fmt(d.close)} V:${fmtInt(d.volume)}`;
}

// ── Mouse events ──
cv.addEventListener('mousemove', e=> showCrosshair(e.clientX, e.clientY));
cv.addEventListener('mouseleave', ()=>{ crossInfo.style.display='none'; drawChart(); });

cv.addEventListener('mousedown', e=>{
  isDragging = true;
  dragStartX = e.clientX;
  dragViewStart = viewStart;
  cv.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e=>{
  if(!isDragging) return;
  const dx = e.clientX - dragStartX;
  const L = cv._layout;
  if(!L) return;
  const barShift = Math.round(dx / L.barW);
  const range = viewEnd - viewStart;
  let ns = dragViewStart - barShift;
  ns = Math.max(0, Math.min(rawData.length - range, ns));
  viewStart = ns;
  viewEnd = ns + range;
  drawChart();
});
window.addEventListener('mouseup', ()=>{
  isDragging = false;
  cv.style.cursor = 'crosshair';
});

// ── Wheel zoom ──
cv.addEventListener('wheel', e=>{
  e.preventDefault();
  const range = viewEnd - viewStart;
  const L = cv._layout;
  if(!L) return;
  const rect = cv.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const ratio = (mx-L.pad.l)/L.chartW;

  let delta = e.deltaY > 0 ? Math.ceil(range*0.1) : -Math.ceil(range*0.1);
  let newRange = range + delta;
  newRange = Math.max(MIN_BARS, Math.min(Math.min(MAX_BARS, rawData.length), newRange));
  if(newRange===range) return;

  const leftShift = Math.round((newRange-range)*ratio);
  let ns = viewStart - leftShift;
  let ne = ns + newRange;
  if(ns<0){ ns=0; ne=newRange; }
  if(ne>rawData.length){ ne=rawData.length; ns=ne-newRange; }
  viewStart = Math.max(0,ns);
  viewEnd = ne;
  drawChart();
}, {passive:false});

// ── Touch events ──
cv.addEventListener('touchstart', e=>{
  if(e.touches.length===1){
    isDragging = true;
    lastTouchX = e.touches[0].clientX;
    dragViewStart = viewStart;
  } else if(e.touches.length===2){
    isDragging = false;
    const dx = e.touches[0].clientX-e.touches[1].clientX;
    const dy = e.touches[0].clientY-e.touches[1].clientY;
    lastPinchDist = Math.sqrt(dx*dx+dy*dy);
  }
}, {passive:true});

cv.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length===1 && isDragging){
    const dx = e.touches[0].clientX - lastTouchX;
    const L = cv._layout;
    if(!L) return;
    const barShift = Math.round(dx / L.barW);
    if(barShift===0) return;
    lastTouchX = e.touches[0].clientX;
    const range = viewEnd-viewStart;
    let ns = viewStart - barShift;
    ns = Math.max(0, Math.min(rawData.length-range, ns));
    viewStart=ns; viewEnd=ns+range;
    drawChart();
    showCrosshair(e.touches[0].clientX, e.touches[0].clientY);
  } else if(e.touches.length===2){
    const dx = e.touches[0].clientX-e.touches[1].clientX;
    const dy = e.touches[0].clientY-e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(lastPinchDist){
      const scale = dist/lastPinchDist;
      const range = viewEnd-viewStart;
      let newRange = Math.round(range/scale);
      newRange = Math.max(MIN_BARS, Math.min(Math.min(MAX_BARS, rawData.length), newRange));
      if(newRange!==range){
        const mid = Math.floor((viewStart+viewEnd)/2);
        let ns = mid-Math.floor(newRange/2);
        let ne = ns+newRange;
        if(ns<0){ns=0;ne=newRange;}
        if(ne>rawData.length){ne=rawData.length;ns=ne-newRange;}
        viewStart=Math.max(0,ns); viewEnd=ne;
        drawChart();
      }
    }
    lastPinchDist = dist;
  }
}, {passive:false});

cv.addEventListener('touchend', ()=>{ isDragging=false; lastPinchDist=0; crossInfo.style.display='none'; });

// ── Resize ──
let resizeTimer;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{ resizeCanvas(); drawChart(); }, 150);
});

// ── Go ──
init();

})();
</script>
