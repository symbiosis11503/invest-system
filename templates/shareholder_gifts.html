<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>股東紀念品 — Symbiosis Invest</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/invest-base.css">
<style>
.gift-controls {
  display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
}
.gift-controls select, .gift-controls input {
  padding: 8px 14px; border-radius: var(--radius-btn); font-size: 0.82em;
  border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-primary);
  font-family: var(--font-sans); outline: none;
}
.gift-controls select:focus, .gift-controls input:focus {
  border-color: var(--accent-indigo);
}
.gift-stats {
  display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
}
.gift-stat {
  background: var(--card-bg); border: 1px solid var(--border-color);
  border-radius: var(--radius-card); padding: 12px 18px; min-width: 140px;
}
.gift-stat .label { font-size: 0.7em; color: var(--text-tertiary); margin-bottom: 2px; }
.gift-stat .value { font-size: 1.3em; font-weight: 700; font-family: var(--font-mono); }
.gift-stat .value.urgent { color: var(--price-up); }
.gift-stat .value.warn { color: var(--yellow); }

/* Row urgency */
.row-urgent { background: rgba(239, 68, 68, 0.08) !important; }
.row-warn { background: rgba(245, 158, 11, 0.08) !important; }
.row-past { opacity: 0.45; }

.frac-yes { color: #22c55e; font-weight: 600; }
.frac-no { color: var(--price-up); font-weight: 600; }
.frac-unknown { color: var(--text-tertiary); }

.gift-value { color: var(--yellow); }
.cost-low { color: #22c55e; }
.cost-high { color: var(--text-secondary); }
.no-data {
  text-align: center; padding: 60px 20px; color: var(--text-tertiary); font-size: 0.9em;
}
.update-info {
  font-size: 0.72em; color: var(--text-tertiary); text-align: right; margin-top: 12px;
}

/* Sortable headers */
.data-table th.sortable { cursor: pointer; user-select: none; }
.data-table th.sortable:hover { color: var(--accent-cyan); }
.data-table th .sort-icon { font-size: 0.8em; margin-left: 4px; }

/* Search highlight */
.highlight { background: rgba(99, 102, 241, 0.2); border-radius: 2px; }
</style>
</head>
<body>
<header class="main-header">
  <div class="logo">Symbiosis Invest</div>
  <nav class="main-nav">
    <a href="/" class="nav-link">儀表板</a>
    <a href="/trading" class="nav-link">策略監控</a>
    <a href="/intelligence" class="nav-link">市場情報</a>
    <a href="/backtests" class="nav-link">回測結果</a>
    <a href="/chipdata" class="nav-link">籌碼分析</a>
    <a href="/screener" class="nav-link">智慧篩選</a>
    <a href="/shareholder-gifts" class="nav-link active">紀念品</a>
  </nav>
</header>

<div class="mobile-tab-bar">
  <div class="tab-items">
    <a href="/" class="tab-item"><span class="tab-icon">📊</span>儀表板</a>
    <a href="/trading" class="tab-item"><span class="tab-icon">📈</span>策略</a>
    <a href="/intelligence" class="tab-item"><span class="tab-icon">🧠</span>情報</a>
    <a href="/screener" class="tab-item"><span class="tab-icon">🔍</span>篩選</a>
    <a href="/shareholder-gifts" class="tab-item active"><span class="tab-icon">🎁</span>紀念品</a>
  </div>
</div>

<div class="page-content">
  <h2 style="font-size:1.1em; margin-bottom:16px;">股東會紀念品追蹤</h2>

  <!-- Stats -->
  <div class="gift-stats" id="stats">
    <div class="gift-stat"><div class="label">總筆數</div><div class="value" id="stat-total">--</div></div>
    <div class="gift-stat"><div class="label">7天內截止</div><div class="value urgent" id="stat-urgent">--</div></div>
    <div class="gift-stat"><div class="label">30天內截止</div><div class="value warn" id="stat-upcoming">--</div></div>
    <div class="gift-stat"><div class="label">零股可領</div><div class="value" id="stat-frac">--</div></div>
    <div class="gift-stat"><div class="label">本週截止</div><div class="value urgent" id="stat-thisweek">--</div></div>
  </div>

  <!-- Controls -->
  <div class="gift-controls">
    <input type="text" id="search" placeholder="搜尋代號/公司/紀念品..." style="min-width:200px;">
    <select id="filter-month">
      <option value="">全部月份</option>
      <option value="3">3月</option>
      <option value="4">4月</option>
      <option value="5">5月</option>
      <option value="6">6月</option>
      <option value="7">7月</option>
      <option value="8">8月</option>
      <option value="9">9月</option>
    </select>
    <select id="filter-frac">
      <option value="">零股 — 全部</option>
      <option value="Y">零股可領</option>
      <option value="N">零股不可</option>
    </select>
    <select id="filter-status">
      <option value="announced" selected>已公告且可買</option>
      <option value="upcoming">尚未截止（可買）</option>
      <option value="urgent">7天內截止</option>
      <option value="">全部（含已過期）</option>
    </select>
    <button class="btn" onclick="loadData()" style="font-size:0.78em;">重新載入</button>
  </div>

  <!-- Table -->
  <div class="card" style="overflow-x:auto;">
    <table class="data-table" id="gift-table">
      <thead>
        <tr>
          <th class="sortable" data-col="stock_id">代號 <span class="sort-icon"></span></th>
          <th class="sortable" data-col="stock_name">公司 <span class="sort-icon"></span></th>
          <th class="sortable" data-col="meeting_date">召開日 <span class="sort-icon"></span></th>
          <th class="sortable" data-col="last_buy_date">最後買進日 <span class="sort-icon"></span></th>
          <th class="sortable" data-col="fractional_eligible">零股 <span class="sort-icon"></span></th>
          <th class="sortable" data-col="last_price">股價 <span class="sort-icon"></span></th>
          <th class="sortable" data-col="cost">成本 <span class="sort-icon"></span></th>
          <th class="sortable" data-col="gift_item">紀念品 <span class="sort-icon"></span></th>
          <th class="sortable" data-col="gift_value">估值 <span class="sort-icon"></span></th>
          <th>照片</th>
        </tr>
      </thead>
      <tbody id="gift-body">
        <tr><td colspan="10" class="no-data">載入中...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="update-info" id="update-info"></div>
</div>

<script>
let allData = [];
let sortCol = 'last_buy_date';
let sortAsc = true;

async function loadData() {
  try {
    const resp = await fetch('/api/shareholder-gifts');
    allData = await resp.json();
    renderStats();
    renderTable();
  } catch (e) {
    document.getElementById('gift-body').innerHTML =
      '<tr><td colspan="10" class="no-data">載入失敗: ' + e.message + '</td></tr>';
  }
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function daysUntil(dateStr) {
  if (!dateStr) return 999;
  const d = new Date(dateStr);
  const now = new Date(today());
  return Math.ceil((d - now) / 86400000);
}

function renderStats() {
  const t = today();
  const total = allData.length;
  const urgent = allData.filter(g => { const d = daysUntil(g.last_buy_date); return d >= 0 && d <= 7; }).length;
  const upcoming = allData.filter(g => { const d = daysUntil(g.last_buy_date); return d >= 0 && d <= 30; }).length;
  const frac = allData.filter(g => g.fractional_eligible === 'Y').length;

  // 本週截止: 從今天到本週日 (day 0=Sun, so remaining = 7 - dayOfWeek, if Sun then 0)
  const now = new Date(today());
  const dayOfWeek = now.getDay(); // 0=Sun
  const daysToSunday = dayOfWeek === 0 ? 0 : 7 - dayOfWeek;
  const thisweek = allData.filter(g => { const d = daysUntil(g.last_buy_date); return d >= 0 && d <= daysToSunday; }).length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-urgent').textContent = urgent;
  document.getElementById('stat-upcoming').textContent = upcoming;
  document.getElementById('stat-frac').textContent = frac;
  document.getElementById('stat-thisweek').textContent = thisweek;

  // Update info
  if (allData.length > 0 && allData[0].updated_at) {
    document.getElementById('update-info').textContent = '最後更新: ' + allData[0].updated_at;
  }
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const month = document.getElementById('filter-month').value;
  const frac = document.getElementById('filter-frac').value;
  const status = document.getElementById('filter-status').value;
  const t = today();

  return allData.filter(g => {
    if (search) {
      const hay = `${g.stock_id} ${g.stock_name} ${g.gift_item || ''}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    if (month && g.meeting_date) {
      const m = parseInt(g.meeting_date.slice(5, 7));
      if (m !== parseInt(month)) return false;
    }
    if (frac && g.fractional_eligible !== frac) return false;
    if (status === 'announced') {
      if (!g.gift_item || g.gift_item === '未公告' || g.gift_item === '待確認') return false;
      if (g.last_buy_date && g.last_buy_date < t) return false;
    }
    if (status === 'upcoming' && (g.last_buy_date < t)) return false;
    if (status === 'urgent') {
      const d = daysUntil(g.last_buy_date);
      if (d < 0 || d > 7) return false;
    }
    return true;
  });
}

function sortData(data) {
  return [...data].sort((a, b) => {
    let va = a[sortCol] ?? '';
    let vb = b[sortCol] ?? '';
    if (sortCol === 'cost') {
      va = a.last_price ? (a.fractional_eligible === 'Y' ? a.last_price : a.last_price * 1000) : 0;
      vb = b.last_price ? (b.fractional_eligible === 'Y' ? b.last_price : b.last_price * 1000) : 0;
      return sortAsc ? va - vb : vb - va;
    }
    if (sortCol === 'gift_value' || sortCol === 'last_price') {
      va = va || 0; vb = vb || 0;
      return sortAsc ? va - vb : vb - va;
    }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

function renderTable() {
  const filtered = sortData(getFiltered());
  const tbody = document.getElementById('gift-body');

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="no-data">沒有符合條件的資料</td></tr>';
    return;
  }

  const t = today();
  tbody.innerHTML = filtered.map(g => {
    const d = daysUntil(g.last_buy_date);
    let cls = '';
    if (d < 0) cls = 'row-past';
    else if (d <= 3) cls = 'row-urgent';
    else if (d <= 7) cls = 'row-warn';

    const fracCls = g.fractional_eligible === 'Y' ? 'frac-yes' :
                    g.fractional_eligible === 'N' ? 'frac-no' : 'frac-unknown';
    const fracText = g.fractional_eligible === 'Y' ? '可' :
                     g.fractional_eligible === 'N' ? '不可' : '未知';

    const deadlineNote = d < 0 ? ' (已過)' : d === 0 ? ' (今天)' : ` (剩${d}天)`;
    const deadlineColor = d < 0 ? 'var(--text-tertiary)' : d <= 3 ? 'var(--price-up)' : d <= 7 ? 'var(--yellow)' : 'var(--text-secondary)';

    const priceStr = g.last_price ? g.last_price.toFixed(2) : '-';
    // 成本計算: 零股可領 = 1股成本, 否則 = 1張(1000股)成本
    const isFrac = g.fractional_eligible === 'Y';
    const costVal = g.last_price ? (isFrac ? g.last_price : g.last_price * 1000) : null;
    const costStr = costVal ? (isFrac ? '$' + costVal.toFixed(0) : '$' + Math.round(costVal).toLocaleString()) : '-';
    const costLabel = costVal ? (isFrac ? '(1股)' : '(1張)') : '';

    const photoQuery = encodeURIComponent('股東紀念品 ' + (g.stock_name || '') + ' ' + (g.gift_item || '') + ' ' + (g.year || ''));
    const photoLink = 'https://www.google.com/search?tbm=isch&q=' + photoQuery;

    return `<tr class="${cls}">
      <td><strong>${g.stock_id}</strong></td>
      <td>${g.stock_name || ''}</td>
      <td class="mono">${g.meeting_date || '-'}</td>
      <td class="mono">${g.last_buy_date || '-'}<br><span style="font-size:0.75em;color:${deadlineColor}">${deadlineNote}</span></td>
      <td class="${fracCls}">${fracText}</td>
      <td class="mono" style="text-align:right">${priceStr}</td>
      <td class="mono" style="text-align:right">${costStr}<br><span style="font-size:0.7em;color:var(--text-tertiary)">${costLabel}</span></td>
      <td>${g.gift_item || '-'}</td>
      <td class="gift-value mono">${g.gift_value ? '$' + g.gift_value : '-'}</td>
      <td style="text-align:center"><a href="${photoLink}" target="_blank" title="搜尋紀念品照片" style="text-decoration:none;font-size:1.1em;">📷</a></td>
    </tr>`;
  }).join('');

  // Update sort icons
  document.querySelectorAll('.data-table th.sortable').forEach(th => {
    const icon = th.querySelector('.sort-icon');
    if (th.dataset.col === sortCol) {
      icon.textContent = sortAsc ? ' ▲' : ' ▼';
    } else {
      icon.textContent = '';
    }
  });
}

// Sort click handlers
document.querySelectorAll('.data-table th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = true; }
    renderTable();
  });
});

// Filter handlers
['search', 'filter-month', 'filter-frac', 'filter-status'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderTable);
  document.getElementById(id).addEventListener('change', renderTable);
});

// Init
loadData();
</script>
</body>
</html>
